name: NHentai Downloader

on:
  workflow_dispatch:
    inputs:
      manga_url:
        description: 'Manga URL (e.g., https://nhentai.net/g/123456/)'
        required: true
        type: string
  push:
    paths:
      - 'constants.txt'  # با هر بار تغییر در این فایل اجرا شود.

permissions:
  contents: read

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare constants.txt
        run: |
          # در صورت وجود فایل از URL ورودی استفاده می‌کند.
          if [ -n "${{ github.event.inputs.manga_url }}" ]; then
            echo "${{ github.event.inputs.manga_url }}" > constants.txt
          fi
          # بررسی می‌کند که فایل constants.txt خالی نباشد.
          if [ ! -s constants.txt ]; then
            echo "❌ Error: constants.txt is empty. Please add manga URLs."
            exit 1
          fi
          echo "📄 constants.txt content:"
          cat constants.txt

      - name: Run downloader script
        run: |
          python save_pdf.py
          # برای استفاده از نسخه سبک‌تر می‌توانید خط پایین را جایگزین کنید:
          # python simple.py

      - name: Upload downloaded files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-manga
          path: |
            */
            *.pdf
          if-no-files-found: ignore
