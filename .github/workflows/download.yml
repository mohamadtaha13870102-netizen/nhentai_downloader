name: NHentai Downloader (Save to Repo)

on:
  workflow_dispatch:
    inputs:
      manga_url:
        description: 'Manga URL (e.g., https://nhentai.net/g/123456/)'
        required: true
        type: string
  push:
    paths:
      - 'constants.txt'

permissions:
  contents: write  # برای اجازه push به ریپو

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # برای جلوگیری از مشکل در push

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare constants.txt
        run: |
          if [ -n "${{ github.event.inputs.manga_url }}" ]; then
            echo "${{ github.event.inputs.manga_url }}" > constants.txt
          fi
          if [ ! -s constants.txt ]; then
            echo "❌ Error: constants.txt is empty."
            exit 1
          fi
          echo "📄 Content of constants.txt:"
          cat constants.txt

      - name: Run downloader script
        run: |
          python save_pdf.py
          # اگر می‌خواهید نسخه ساده را اجرا کنید، خط بالا را کامنت کرده و خط زیر را فعال کنید:
          # python simple.py

      - name: Create download folder and move files
        run: |
          mkdir -p download
          # همه پوشه‌هایی که دانلود شده‌اند (به جز .git, download, __pycache__ و غیره)
          # و همه فایل‌های PDF موجود در ریشه را به download منتقل کنید
          for dir in */; do
            if [[ "$dir" != "download/" && "$dir" != "__pycache__/" && "$dir" != ".git/" ]]; then
              mv "$dir" download/ 2>/dev/null || true
            fi
          done
          mv *.pdf download/ 2>/dev/null || true
          echo "✅ Files moved to download/"

      - name: Commit and push downloaded files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add download/
          if git diff --staged --quiet; then
            echo "📭 No new files to commit."
            exit 0
          fi
          git commit -m "Add downloaded manga files [skip ci]"
          git push
